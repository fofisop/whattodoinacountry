<!DOCTYPE html>t
<html lang="en">
<head>
    <style>
#cards{
    display:flex;
    gap:20px;
}

#cards div{
    border:2px solid black;
    padding:20px;
    width:200px;
    border-radius:10px;
}

    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>roadtipwinner</title>
</head>
<body>
    <div id="startScreen">

    <h1>Road Trip Winner</h1>

    <h2>Rules:</h2>
    <p>
Find things on your road trip that match the cards.
<br>
Click <strong>Complete</strong> when you find one.
<br>

Each completed card gives you 1 point!
<br>
Reach your chosen goal to win!
</p>
    <input
    type="number"
    id="goalInput"
    value="100"
>

<button onclick="startGame()">
    Start Game
</button>
    </div>

<div id="game" style="display:none;">
    <h1></h1>
    <p>Points: <span id="points">0</span></p>
    <div id="cards"></div>
    <h2>Shop</h2>

<p>Swap Cards: <span id="swaps">0</span></p>

<button onclick="buySwap()">
    Buy Swap Card (10 Points)
</button>
<button onclick="buyUwuowo()">
    Buy Double Points (15 Points)
</button>
</div>


    <script>
const taskies=[
"A person with colored hair",
"A motorcycle",
"A plane",
"A boat",
"A red car",
"A police car",
"A big truck",
"A building more than ten stories tall",

""
]
let goal = Infinity;
let swaps = 0;
let uwuowo = false;
let points = 0;
let activeCards = [];
function getrandomCard(){
    const randomIndex = Math.floor(Math.random() * taskies.length);
    return taskies [randomIndex];
}
for (let i = 0; i < 3; i++) {
     let newCard = getrandomCard();

    while (activeCards.includes(newCard)) {
        newCard = getrandomCard();
    }
     activeCards.push(newCard);
} ;
   function displayCardsss(){
    const cardContainer = document.getElementById("cards");
    cardContainer.innerHTML = "";
    activeCards.forEach((taskies, index) => {

    cardContainer.innerHTML += `
    <div>
    
    <p>${taskies}</p>
                <button onclick="completeCard(${index})">
                    Complete</button>
                    
                     <button onclick="swapCard(${index})">
Swap Me
</button>
         </div>    
                
                    `
                    
                      });
                      
            }
function completeCard(index){
    if (uwuowo) {
    points += 2;
} else {
    points++;
}

document.getElementById("points").textContent = points;
    document.getElementById("points").textContent = points;
    if (points >= goal) {
    alert(" You reached your goal!");

}
    let newCard = getrandomCard();

while (activeCards.includes(newCard)) {
    newCard = getrandomCard();
}

activeCards[index] = newCard
;
    displayCardsss();


}  
displayCardsss();


function startGame() {

    goal = Number(document.getElementById("goalInput").value);

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";

}
function buySwap() {

    if (points >= 10) {

        points -= 10;
        swaps++;

        document.getElementById("points").textContent = points;
        document.getElementById("swaps").textContent = swaps;
    } else {

        alert("You need 10 points!");

    }

}
function swapCard(index){

    if (swaps <= 0){
        alert("You don't have any swap cards!");
        return;
    }

    swaps--;

    document.getElementById("swaps").textContent = swaps;

    let newCard = getrandomCard();

    while (activeCards.includes(newCard)){
        newCard = getrandomCard();
    }

    activeCards[index] = newCard;

    displayCardsss();
}
function buyUwuowo() {

    if (points < 15) {
        alert("You need 15 points!");
        return;
    }

    points -= 15;
    document.getElementById("points").textContent = points;

    uwuowo = true;

    alert("Double Points activated for 5 minutes!");

    setTimeout(function () {
        uwuowo = false;
        alert("Double Points has ended!");
    }, 300000);
}

      </script>
</body>
</html>
