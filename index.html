<!DOCTYPE html>
<html lang="en">
<head>
    <style>
#cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 30px 0;
}


#cards div {
    background-color: white;
    border: 2px solid black;
    padding: 20px;
    width: 200px;
    min-height: 120px;
    border-radius: 15px;
    box-shadow: 4px 4px 0px #333;
}
#shopItUp {
 max-width: 500px;
    margin: 30px auto;
    padding: 25px;
    background-color: white;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}
#shopItUp button{
     background-color: #6f9eaf;
    color: white;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    
}
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #AEC6CF;
    margin: 0;
    padding: 30px;
}
input[type="number"] {
    padding: 10px;
    width: 100px;
    border: 2px solid #333;
    border-radius: 8px;
    font-size: 16px;
}

#game {
    max-width: 1000px;
    margin: auto;
}
#startScreen {
    max-width: 600px;
    margin: 50px auto;
    background-color: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

button {
    padding: 10px 16px;
    margin: 8px;
    border: 2px solid #333;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>roadtipwinner</title>
</head>
<body>
    <div id="startScreen">

    <h1>The Road Trip Quest</h1>

    <h2>Rules:</h2>
    <p>
Find things on your road trip that match the cards.
<br>
Click <strong>Complete</strong> when you find one.
<br>

Each completed card gives you 1 point!
<br>
Reach your chosen goal to win, or choose Unlimited Mode!
</p>
    <input
    type="number"
    id="goalInput"
    value="50"
>
<label>
    <input type="checkbox" id="modeOfTheUnlimitedPowerHAHAHAH">
    Unlimited Mode
</label>
<button onclick="startGame()">
    Start Game
</button>
    </div>

<div id="game" style="display:none;">
    <h1></h1>
    <p>Points: <span id="points">0</span></p>
    <div id="cards"></div>
    <div id="shopItUp">
    <h2>Shop</h2>

<p>Swap Cards: <span id="swaps">0</span></p>

<button onclick="buySwap()">
    Buy Swap Card (10 Points)
</button>
<button onclick="buyUwuowo()">
    Buy Double Points (15 Points)
</button>
</div>
</div>


    <script>
const taskies=[
"A person with colored hair",
"A motorcycle",
"A plane",
"A boat",
"A red car",
"A police car",
"A big truck",
"A lake or river",
"A mountain",
"A building more than ten stories tall",
"A bird",
"A stopsign",
"A mailbox",
"A restaurant",
"A gas station",
"A motel/hotel",
"Graffiti or a mural",
"A statue",
"A fountain",
"A car with something on its roof",
"Someone wearing sunglasses",
"A yellow house",
"A blue house",
"A modern house",
"A farm animal",
"Fields of plants",
"A license plate with the letter: Z",
"A license plate with the letter: X",
"A license plate with the letter: Y",
"A bike",
"A dog in a car",
"A person walking their dog",
"A construction vehicle",
"A traffic cone",
"A green car",
"A convertible",
"A school bus",
"An ambulance",
"A fire truck",
"A tractor",
"A train",
"A bridge",
"A tunnel",
"A water tower",
"A wind turbine",
"A person wearing a hat",
"A playground",
"A church",
"A barn",
"A swimming pool",
"A person running",
"A house with a porch",
"A house with a fence",
"A basketball hoop",
"A large tree",
"A fallen tree",
"A flower garden",
"A food truck",
"A roundabout",
"A yield sign",
"A one-way sign",
"A speed limit sign",
"A fire station",
"A car wash",
"A movie theater",
"A library",
"A school",
"A fire hydrant",
"A shopping cart outside of a store",
"A flag",
"A person with a suitcase",
"A group of five or more people",
"Someone sitting on a bench",
"A person using an umbrella",
"A giant inflatable",
"A camper or RV",
"A neon sign",
"A coffee shop",

]
let goal = Infinity;
let swaps = 0;
let uwuowo = false;
let points = 0;
let activeCards = [];
function getrandomCard(){
    const randomIndex = Math.floor(Math.random() * taskies.length);
    return taskies [randomIndex];
}
for (let i = 0; i < 3; i++) {
     let newCard = getrandomCard();

    while (activeCards.includes(newCard)) {
        newCard = getrandomCard();
    }
     activeCards.push(newCard);
} ;
   function displayCardsss(){
    const cardContainer = document.getElementById("cards");
    cardContainer.innerHTML = "";
    activeCards.forEach((taskies, index) => {

    cardContainer.innerHTML += `
    <div>
    
    <p>${taskies}</p>
                <button onclick="completeCard(${index})">
                    Complete</button>
                    
                     <button onclick="swapCard(${index})">
Swap Me
</button>
         </div>    
                
                    `
                    
                      });
                      
            }
function completeCard(index){
    if (uwuowo) {
    points += 2;
} else {
    points++;
}

document.getElementById("points").textContent = points;
    if (points >= goal) {
    alert(" You reached your goal!");

}
    let newCard = getrandomCard();

while (activeCards.includes(newCard)) {
    newCard = getrandomCard();
}

activeCards[index] = newCard
;
    displayCardsss();
saveGame();

}  
displayCardsss();



function buySwap() {

    if (points >= 10) {

        points -= 10;
        swaps++;

        document.getElementById("points").textContent = points;
        document.getElementById("swaps").textContent = swaps;
    } else {

        alert("You need 10 points!");

    }
saveGame();
}
function swapCard(index){

    if (swaps <= 0){
        alert("You don't have any swap cards!");
        return;
    }

    swaps--;

    document.getElementById("swaps").textContent = swaps;

    let newCard = getrandomCard();

    while (activeCards.includes(newCard)){
        newCard = getrandomCard();
    }

    activeCards[index] = newCard;

    displayCardsss();
    saveGame();
}
function buyUwuowo() {

    if (points < 15) {
        alert("You need 15 points!");
        return;
    }

    points -= 15;
    document.getElementById("points").textContent = points;

    uwuowo = true;

    alert("Double Points activated for 5 minutes!");

    setTimeout(function () {
        uwuowo = false;
        alert("Double Points has ended!");
    }, 300000);
}
function startGame() {

    unlimited = document.getElementById("modeOfTheUnlimitedPowerHAHAHAH").checked;

    if (unlimited) {
        goal = Infinity;
    } else {
        goal = Number(document.getElementById("goalInput").value);
    }
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
}


function saveGame() {
    localStorage.setItem("points", points);
    localStorage.setItem("swaps", swaps);
    localStorage.setItem("activeCards", JSON.stringify(activeCards));
}
function loadGame(){
     const savedPoints = localStorage.getItem("points");
    const savedSwaps = localStorage.getItem("swaps");
    const savedCards = localStorage.getItem("activeCards");

    if (savedPoints !== null) {
        points = Number(savedPoints);
        document.getElementById("points").textContent = points;
}
   if (savedSwaps !== null) {
        swaps = Number(savedSwaps);
        document.getElementById("swaps").textContent = swaps;
    }
    if (savedCards !== null) {
        activeCards = JSON.parse(savedCards);
        displayCardsss();
    }


}
loadGame();
      </script>
</body>
</html>
